<html>
    <body>
        <label for='num'>Enter Number</label>
        <input type="number" id="num">
        <button onclick="printPrime()">Show Prime</button>
        <p id="res"></p>
        <script>
            function printPrime() {
                let num = document.getElementById("num").value;
                let res = document.getElementById("res");
                res.innerHTML = "";
                for (let i = 2; i <= num; i++) {
                    if (isPrime(i)) {
                        res.innerHTML += i + " ";
                    }
                }
            }

            function isPrime(n) {
                for (let i = 2; i <= Math.sqrt(n); i++) {
                    if (n % i === 0) {
                        return false;
                    }
                }
                return true;
            }
        </script>
    </body>
</html>
