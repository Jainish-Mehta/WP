<html>
<head>
    <style>
        a:link {
            color: green;
        }

        a:visited {
            color: red;
        }

        table {
            border-collapse: collapse;
            width: 50%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
        }

        tr:nth-child(odd){
            background-color: black;
            color: white;
        }
        tr:nth-child(even){
            background-color: white;
            color: #000;
        }

        p{
            color: green;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <a href="https://www.google.com">Visit</a>
    <table>
        <tr>
            <th>Name</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>A</td>
            <td>100</td>
        </tr>
        <tr>
            <td>B</td>
            <td>95</td>
        </tr>
    </table>
    <p>hello world</p>
</body>

</html>
