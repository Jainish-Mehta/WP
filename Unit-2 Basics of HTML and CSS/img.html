<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styled Image Example</title>
  <style>
    img {
      max-width: 100%;
      height: auto;
      border: 3px solid black;
      border-radius: 10px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <img src="DungeonLogo.png" alt="Styled Image">
  
  <img src="DungeonLogo.png" alt="Styled Image">
  
  <img src="DungeonLogo.png" alt="Styled Image">
  
  <img src="DungeonLogo.png" alt="Styled Image">
</body>
</html>
