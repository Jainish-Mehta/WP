<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="user" placeholder="User ID">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="validate()">Validate</button>
    <script>
        function validate(){
            const userid=document.getElementById('user').value;
            const pass=document.getElementById('pass').value;

            if(userid=='' || pass==''){
                alert("Username or Password cannot be empty!");
                return false;
            }

            if(!/^[0-9]+$/.test(userid)){
                alert('Username can only be number!');
                return false;
            }

            if(pass.length<8){
                alert('Password must be atleast 8 characters long!');
                return false;
            }
            if(!/[A-Z]/.test(pass)){
                alert('Password must contain atleast one Capital letter!');
                return false;
            }
            if(!/[^A-Za-z0-9]/.test(pass)){
                alert('Password must contain atleast one special character!');
                return false;
            }

            if(!/[0-9]/.test(pass)){
                alert('Passord must contain atleast one digit!');
                return false;
            }

            alert('Validation Successful');
            return true;
        }
    </script>
</body>
</html>
