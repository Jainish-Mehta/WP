<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border: 1px solid black;
            border-collapse: collapse;
        }
        tr,th,td{
            text-align: center;
            border: 1px solid black;
            padding: 15px;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <th rowspan="2">State of health</th>
            <th colspan="2">Fasting Value</th>
            <tr>
                <th>Minimum</th>
                <th>Maximum</th>
            </tr>

        </tr>
        <tr>
            <td>Healthy</td>
            <td>70</td>
            <td>100</td>
        </tr>
        <tr>
            <td>Pre-Diabetes</td>
            <td>101</td>
            <td>126</td>
        </tr>
        <tr>
            <td>Diabetes</td>
            <td>More than 126</td>
            <td>N/A</td>
        </tr>
    </table>
</body>

</html>
