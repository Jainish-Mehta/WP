<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rainbow Text</title>
  <style>
    .rainbow {
      text-align: center;       
      font-size: 48px;          
      font-weight: bold;
    }
    .r { color: red; }
    .a { color: orange; }
    .i { color: yellow; }
    .n { color: green; }
    .b { color: blue; }
    .o { color: indigo; }
    .w { color: violet; }
  </style>
</head>
<body>
  <div class="rainbow">
    <span class="r">R</span>
    <span class="a">A</span>
    <span class="i">I</span>
    <span class="n">N</span>
    <span class="b">B</span>
    <span class="o">O</span>
    <span class="w">W</span>
  </div>
</body>
</html>
