<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border: 1px solid black;
            border-collapse: collapse;
        }
        tr,th,td{
            border: 1px solid black;
        }
        #test{
            text-align: center;
        }
    </style>
</head>

<body>
    <table>
        <caption>Weekly Time Table</caption>
        <tr>
            <th rowspan="2">Day</th>
            <th colspan="3">Lecture Timmings</th>
            <tr>
                <th>10:30am–11:30am</th>
                <th>11:30am–12:30pm</th>
                <th>1:00pm–2:00pm</th>
            </tr>

        </tr>
        <tr>
            <td>Monday</td>
            <td>DS</td>
            <td>SE</td>
            <td>WP</td>
        </tr>
        <tr>
            <td>Tuesday</td>
            <td>OS</td>
            <td>WP</td>
            <td>CN</td>
        </tr>
        <tr>
            <td>Wednesday</td>
            <td>DS</td>
            <td>SE</td>
            <td>CN</td>
        </tr>
        <tr>
            <td>Thursday</td>
            <td>OS</td>
            <td>SE</td>
            <td>ML</td>
        </tr>
        <tr>
            <td>Friday</td>
            <td colspan="3" id="test">Test</td>
        </tr>
    </table>
</body>

</html>
