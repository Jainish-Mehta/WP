<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="heading" onmouseenter="mouseIn()" onmouseleave="mouseOut()">This is a Heading</h1>
    <script>
        const heading=document.getElementById('heading');
        function mouseIn(){
            heading.style.color='green';
        }
        function mouseOut(){
            heading.style.color='red';
        }
    </script>
</body>
</html>
